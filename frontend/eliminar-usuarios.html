<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>KinePro - Gestión de Pacientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light py-4">
    <div class="container" style="max-width: 900px;">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold text-dark mb-0">Gestión de Usuarios</h2>
                <p class="text-muted mb-0">Listado completo para dar de baja pacientes en el sistema.</p>
            </div>
            <button onclick="window.history.back()" class="btn btn-outline-secondary d-flex align-items-center gap-2">
                <i class="ti ti-arrow-back-up"></i> Volver al Menú
            </button>
        </div>

        <div class="card p-3 shadow-sm border-0" style="border-radius: 12px;">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Apellido</th>
                        <th>DNI</th>
                        <th>Email</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-pacientes-cuerpo">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="./src/gestion-usuarios.js"></script>
</body>
</html>
