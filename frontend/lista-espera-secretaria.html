<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Espera - KinePro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --verde: #2d6a4f;
            --verde-claro: #52b788;
            --fondo: #f0f4f8;
            --blanco: #ffffff;
            --borde: #e0e0e0;
            --texto: #2c3e50;
            --texto-sec: #7f8c8d;
            --naranja: #f4a261;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--fondo); color: var(--texto); min-height: 100vh; padding: 2rem; }
        .page-header { max-width: 700px; margin: 0 auto 1.5rem auto; display: flex; justify-content: space-between; align-items: center; }
        .page-header h1 { font-size: 22px; font-weight: 600; }
        .page-header p { font-size: 13px; color: var(--texto-sec); margin-top: 2px; }
        .btn-volver { background: var(--blanco); border: 1px solid var(--borde); border-radius: 8px; padding: 8px 14px; font-size: 13px; color: var(--texto-sec); cursor: pointer; display: flex; align-items: center; gap: 6px; text-decoration: none; }
        .btn-volver:hover { background: var(--fondo); color: var(--texto); }
        .pasos { max-width: 700px; margin: 0 auto 1.5rem auto; display: flex; gap: 8px; }
        .paso { flex: 1; padding: 10px 14px; border-radius: 8px; font-size: 13px; font-weight: 500; background: var(--blanco); border: 1px solid var(--borde); color: var(--texto-sec); display: flex; align-items: center; gap: 8px; }
        .paso.activo { background: var(--verde); color: white; border-color: var(--verde); }
        .paso.completado { background: #d8f3dc; color: var(--verde); border-color: #b7e4c7; }
        .paso-num { width: 22px; height: 22px; border-radius: 50%; background: rgba(255,255,255,0.25); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
        .paso.activo .paso-num { background: rgba(255,255,255,0.3); }
        .paso.completado .paso-num { background: var(--verde-claro); color: white; }
        .contenedor { max-width: 700px; margin: 0 auto; background: var(--blanco); border-radius: 12px; border: 1px solid var(--borde); overflow: hidden; }
        .contenedor-header { padding: 1.2rem 1.5rem; border-bottom: 1px solid var(--borde); font-size: 14px; font-weight: 600; color: var(--texto-sec); background: #fafafa; }
        .area-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 20px; border-bottom: 1px solid var(--borde); cursor: pointer; transition: background 0.15s; }
        .area-item:last-child { border-bottom: none; }
        .area-item:hover { background: #f8fffe; }
        .area-nombre { font-size: 15px; font-weight: 500; }
        .area-desc { font-size: 12px; color: var(--texto-sec); margin-top: 2px; }
        .btn-seleccionar { background: var(--verde-claro); color: white; border: none; border-radius: 8px; padding: 7px 16px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .btn-seleccionar:hover { background: var(--verde); }
        .turno-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 20px; border-bottom: 1px solid var(--borde); }
        .turno-item:last-child { border-bottom: none; }
        .turno-fecha { font-size: 14px; font-weight: 600; }
        .turno-hora { font-size: 13px; color: var(--texto-sec); margin-top: 3px; }
        .turno-cupos { font-size: 12px; color: #e63946; font-weight: 500; margin-top: 3px; }
        .btn-lista { background: var(--naranja); color: white; border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
        .btn-lista:hover { filter: brightness(0.9); }
        .empty { padding: 2.5rem; text-align: center; color: var(--texto-sec); font-size: 14px; }
        .empty i { font-size: 36px; display: block; margin-bottom: 8px; color: #bdc3c7; }
        .spinner-wrap { padding: 2rem; display: flex; justify-content: center; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000; justify-content: center; align-items: center; }
        .modal-overlay.visible { display: flex; }
        .modal-box { background: white; border-radius: 12px; padding: 2rem; width: 100%; max-width: 420px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .modal-box h3 { font-size: 18px; margin-bottom: 6px; }
        .modal-box p { font-size: 13px; color: var(--texto-sec); margin-bottom: 1.2rem; }
        .modal-box label { font-size: 13px; font-weight: 600; display: block; margin-bottom: 6px; }
        .modal-box input { width: 100%; padding: 10px 12px; border: 1px solid var(--borde); border-radius: 8px; font-size: 15px; outline: none; transition: border 0.2s; }
        .modal-box input:focus { border-color: var(--verde-claro); }
        .modal-actions { display: flex; gap: 10px; margin-top: 1.5rem; }
        .btn-cancelar { flex: 1; padding: 10px; border: 1px solid var(--borde); border-radius: 8px; background: transparent; color: var(--texto-sec); font-size: 14px; cursor: pointer; }
        .btn-cancelar:hover { background: var(--fondo); }
        .btn-confirmar { flex: 1; padding: 10px; border: none; border-radius: 8px; background: var(--verde); color: white; font-size: 14px; font-weight: 600; cursor: pointer; }
        .btn-confirmar:hover { background: #1b4332; }
        .area-badge { display: inline-flex; align-items: center; gap: 6px; background: #d8f3dc; color: var(--verde); border-radius: 20px; padding: 4px 12px; font-size: 12px; font-weight: 600; cursor: pointer; margin-left: 8px; }
        .area-badge:hover { background: #b7e4c7; }
    </style>
</head>
<body>

    <div class="page-header">
        <div>
            <h1><i class="ti ti-clock-pause"></i> Lista de Espera</h1>
            <p>Agregá o quitá pacientes de la lista de espera de un turno sin cupo.</p>
        </div>
        <a href="./index-secretaria.html" class="btn-volver">
            <i class="ti ti-arrow-left"></i> Volver
        </a>
    </div>

    <div class="pasos">
        <div class="paso activo" id="paso1"><div class="paso-num">1</div>Seleccionar área</div>
        <div class="paso" id="paso2"><div class="paso-num">2</div>Ver turnos sin cupo</div>
        <div class="paso" id="paso3"><div class="paso-num">3</div>Gestionar lista</div>
    </div>

    <div class="contenedor">
        <div class="contenedor-header" id="contenedor-titulo">Áreas de tratamiento disponibles</div>
        <div id="contenido-principal">
            <div class="spinner-wrap">
                <div class="spinner-border text-success" role="status"></div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-box">
            <h3><i class="ti ti-user-plus"></i> Agregar a lista de espera</h3>
            <p id="modal-descripcion">Ingresá el DNI del paciente para agregarlo.</p>
            <label for="input-dni">DNI del paciente</label>
            <input type="text" id="input-dni" placeholder="Ej: 40123456" maxlength="10">
            <div class="modal-actions">
                <button class="btn-cancelar" id="btn-cancelar">Cancelar</button>
                <button class="btn-confirmar" id="btn-confirmar">
                    <i class="ti ti-check"></i> Confirmar
                </button>
            </div>
        </div>
    </div>

    <script>
        const rol = sessionStorage.getItem('rol');
        if (!rol || rol !== 'Secretaria') window.location.href = '/';

        let turnoSeleccionado = null;
        let areaSeleccionada = null;

        // ── PASO 1: cargar áreas ──────────────────────────────────────
        async function cargarAreas() {
            const contenido = document.getElementById('contenido-principal');
            setPaso(1);
            document.getElementById('contenedor-titulo').innerHTML = 'Áreas de tratamiento disponibles';

            try {
                const resp = await fetch('http://localhost:3000/area');
                const areas = await resp.json();

                if (areas.length === 0) {
                    contenido.innerHTML = `<div class="empty"><i class="ti ti-mood-empty"></i>No hay áreas registradas.</div>`;
                    return;
                }

                contenido.innerHTML = areas.map(area => `
                    <div class="area-item" onclick="cargarTurnosSinCupo(${area.id}, '${area.nombre}')">
                        <div>
                            <div class="area-nombre">${area.nombre}</div>
                            <div class="area-desc">${area.descripcion || 'Sin descripción'}</div>
                        </div>
                        <button class="btn-seleccionar">
                            <i class="ti ti-chevron-right"></i> Seleccionar
                        </button>
                    </div>
                `).join('');

            } catch (e) {
                contenido.innerHTML = `<div class="empty"><i class="ti ti-wifi-off"></i>No se pudo conectar al servidor.</div>`;
            }
        }

        // ── PASO 2: turnos sin cupo del área ─────────────────────────
        async function cargarTurnosSinCupo(idArea, nombreArea) {
            const contenido = document.getElementById('contenido-principal');
            areaSeleccionada = { id: idArea, nombre: nombreArea };
            setPaso(2);

            document.getElementById('contenedor-titulo').innerHTML = `
                Turnos sin cupo · 
                <span class="area-badge" onclick="cargarAreas()">
                    <i class="ti ti-arrow-left"></i> ${nombreArea}
                </span>
            `;

            contenido.innerHTML = `<div class="spinner-wrap"><div class="spinner-border text-success" role="status"></div></div>`;

            try {
                const resp = await fetch(`http://localhost:3000/turnos/area/${idArea}`);
                const turnos = await resp.json();

                const sinCupo = turnos.filter(t => t.cupo_maximo - t.cupos_ocupados <= 0);

                if (sinCupo.length === 0) {
                    contenido.innerHTML = `
                        <div class="empty">
                            <i class="ti ti-circle-check"></i>
                            Todos los turnos de esta área tienen cupo disponible.<br>
                            <small>No hay listas de espera activas.</small>
                        </div>`;
                    return;
                }

                contenido.innerHTML = sinCupo.map(turno => `
                    <div class="turno-item">
                        <div>
                            <div class="turno-fecha">
                                <i class="ti ti-calendar"></i> ${turno.fecha_turno}
                            </div>
                            <div class="turno-hora">
                                <i class="ti ti-clock"></i> 
                                ${turno.hora_comienzo.substring(0,5)} hs — ${turno.hora_fin.substring(0,5)} hs
                            </div>
                            <div class="turno-cupos">Sin cupos disponibles</div>
                        </div>
                        <div style="display:flex; gap:8px;">
                            <button class="btn-lista" onclick="abrirModal(${turno.id}, '${turno.fecha_turno}', '${turno.hora_comienzo}')">
                                <i class="ti ti-clock-pause"></i> Agregar
                            </button>
                            <button class="btn-lista" style="background:#e63946;" onclick="verListaEspera(${turno.id}, '${turno.fecha_turno}', '${turno.hora_comienzo}')">
                                <i class="ti ti-list"></i> Ver lista
                            </button>
                        </div>
                    </div>
                `).join('');

            } catch (e) {
                contenido.innerHTML = `<div class="empty"><i class="ti ti-wifi-off"></i>Error al cargar los turnos.</div>`;
            }
        }

        // ── PASO 3: ver lista de espera de un turno ───────────────────
        async function verListaEspera(idTurno, fecha, hora) {
            const contenido = document.getElementById('contenido-principal');
            setPaso(3);

            document.getElementById('contenedor-titulo').innerHTML = `
                Pacientes en lista de espera · 
                <span class="area-badge" onclick="cargarTurnosSinCupo(areaSeleccionada.id, areaSeleccionada.nombre)">
                    <i class="ti ti-arrow-left"></i> Volver a turnos
                </span>
            `;

            contenido.innerHTML = `<div class="spinner-wrap"><div class="spinner-border text-success" role="status"></div></div>`;

            try {
                const resp = await fetch(`http://localhost:3000/lista-espera/${idTurno}`);
                const lista = await resp.json();

                if (lista.length === 0) {
                    contenido.innerHTML = `
                        <div class="empty">
                            <i class="ti ti-users"></i>
                            No hay pacientes en lista de espera para este turno.
                        </div>`;
                    return;
                }

                contenido.innerHTML = `
                    <div style="padding:12px 20px; background:#fafafa; border-bottom:1px solid var(--borde); font-size:13px; color:var(--texto-sec);">
                        Turno: <strong>${fecha}</strong> a las <strong>${hora.substring(0,5)} hs</strong> — ${lista.length} paciente(s) en espera
                    </div>
                    ${lista.map(item => `
                        <div class="turno-item">
                            <div>
                                <div class="turno-fecha">${item.usuario.nombre} ${item.usuario.apellido}</div>
                                <div class="turno-hora">DNI: ${item.usuario.dni}</div>
                                <div class="turno-cupos">Posición en lista: #${item.orden}</div>
                            </div>
                            <button class="btn-lista" style="background:#e63946;" 
                                onclick="darDeBaja(${idTurno}, ${item.usuario.id}, '${item.usuario.nombre} ${item.usuario.apellido}', '${fecha}', '${hora}')">
                                <i class="ti ti-user-minus"></i> Dar de baja
                            </button>
                        </div>
                    `).join('')}
                `;

            } catch (e) {
                contenido.innerHTML = `<div class="empty"><i class="ti ti-wifi-off"></i>Error al cargar la lista.</div>`;
            }
        }

        // ── Dar de baja ───────────────────────────────────────────────
        async function darDeBaja(idTurno, idUsuario, nombrePaciente, fecha, hora) {
            const confirmacion = await Swal.fire({
                icon: 'warning',
                title: '¿Dar de baja?',
                text: `¿Querés quitar a ${nombrePaciente} de la lista de espera?`,
                showCancelButton: true,
                confirmButtonColor: '#e63946',
                cancelButtonColor: '#aaa',
                confirmButtonText: 'Sí, dar de baja',
                cancelButtonText: 'Cancelar'
            });

            if (!confirmacion.isConfirmed) return;

            try {
                const resp = await fetch('http://localhost:3000/lista-espera', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ idTurno, idUsuario })
                });

                const data = await resp.json();

                if (!resp.ok) {
                    Swal.fire({ icon: 'error', title: 'Error', text: data.error || 'No se pudo dar de baja.', confirmButtonColor: '#2d6a4f' });
                    return;
                }

                Swal.fire({
                    icon: 'success',
                    title: '¡Dado de baja!',
                    text: `${nombrePaciente} fue removido de la lista de espera.`,
                    confirmButtonColor: '#2d6a4f'
                }).then(() => verListaEspera(idTurno, fecha, hora));

            } catch (e) {
                Swal.fire({ icon: 'error', title: 'Error', text: 'No se pudo conectar al servidor.', confirmButtonColor: '#2d6a4f' });
            }
        }

        // ── Modal agregar ─────────────────────────────────────────────
        function abrirModal(idTurno, fecha, hora) {
            turnoSeleccionado = idTurno;
            document.getElementById('modal-descripcion').textContent =
                `Turno: ${fecha} a las ${hora.substring(0,5)} hs — Área: ${areaSeleccionada.nombre}`;
            document.getElementById('input-dni').value = '';
            document.getElementById('modal-overlay').classList.add('visible');
            document.getElementById('input-dni').focus();
        }

        function cerrarModal() {
            document.getElementById('modal-overlay').classList.remove('visible');
        }

        document.getElementById('btn-cancelar').addEventListener('click', cerrarModal);

        document.getElementById('btn-confirmar').addEventListener('click', async () => {
            const dni = document.getElementById('input-dni').value.trim();

            if (!dni) {
                Swal.fire({ icon: 'warning', title: 'DNI requerido', text: 'Ingresá el DNI del paciente.', confirmButtonColor: '#2d6a4f' });
                return;
            }

            try {
                const respPaciente = await fetch(`http://localhost:3000/usuarios/buscar/${dni}`);
                const pacientes = await respPaciente.json();
                const paciente = pacientes[0];

                if (!paciente) {
                    Swal.fire({ icon: 'error', title: 'No encontrado', text: 'No existe un paciente con ese DNI.', confirmButtonColor: '#2d6a4f' });
                    return;
                }

                const respLista = await fetch('http://localhost:3000/lista-espera', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ idTurno: turnoSeleccionado, idUsuario: paciente.id })
                });

                const data = await respLista.json();

                if (!respLista.ok) {
                    Swal.fire({ icon: 'error', title: 'No se pudo agregar', text: data.error || 'Error desconocido.', confirmButtonColor: '#2d6a4f' });
                    return;
                }

                cerrarModal();
                Swal.fire({
                    icon: 'success',
                    title: '¡Agregado!',
                    text: 'Se agregó exitosamente a la lista de espera para el área seleccionada',
                    confirmButtonColor: '#2d6a4f'
                }).then(() => cargarTurnosSinCupo(areaSeleccionada.id, areaSeleccionada.nombre));

            } catch (e) {
                Swal.fire({ icon: 'error', title: 'Error', text: 'No se pudo conectar al servidor.', confirmButtonColor: '#2d6a4f' });
            }
        });

        // ── Helpers ───────────────────────────────────────────────────
        function setPaso(n) {
            [1,2,3].forEach(i => {
                const el = document.getElementById(`paso${i}`);
                el.classList.remove('activo', 'completado');
                if (i < n) el.classList.add('completado');
                if (i === n) el.classList.add('activo');
            });
        }

        document.getElementById('modal-overlay').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modal-overlay')) cerrarModal();
        });

        document.getElementById('input-dni').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('btn-confirmar').click();
        });

        cargarAreas();
    </script>
</body>
</html>
