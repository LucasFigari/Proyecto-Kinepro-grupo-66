<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Pago en Efectivo</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg-principal: #f4f7f6;
            --blanco: #ffffff;
            --texto-principal: #2c3e50;
            --texto-secundario: #7f8c8d;
            --celeste-clinico: #00a896;
            --verde-hover: #008f80;
            --borde: #e2e8f0;
            --sombra: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --radio-esquina: 12px;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', sans-serif; 
        }

        body { 
            background-color: var(--bg-principal); 
            color: var(--texto-principal); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px; 
        }

        .payment-container { 
            background: var(--blanco); 
            width: 100%; 
            max-width: 450px; 
            padding: 30px; 
            border-radius: var(--radio-esquina); 
            box-shadow: var(--sombra); 
        }

        h2 {
            font-size: 22px;
            margin-bottom: 8px;
            color: var(--texto-principal);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        h2 .material-icons-round {
            color: var(--celeste-clinico);
        }

        p {
            font-size: 14px;
            color: var(--texto-secundario);
            margin-bottom: 20px;
        }

        .form-group { 
            margin-bottom: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 8px;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 600;
            color: var(--texto-principal);
        }

        input { 
            padding: 12px; 
            font-size: 16px; 
            border: 1px solid var(--borde);
            border-radius: 8px;
            outline: none;
            background-color: var(--blanco);
            transition: border 0.2s;
            width: 100%;
        }

        input:focus {
            border-color: var(--celeste-clinico);
        }

        .btn-enviar {
            background: var(--celeste-clinico);
            border: none;
            color: white;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }

        .btn-enviar:hover {
            background: var(--verde-hover);
        }
    </style>
</head>
<body>

    <div class="payment-container">
        <h2>
            <span class="material-icons-round">payments</span>
            Pago en Efectivo
        </h2>
        <p>Registre el pago en caja identificando el turno y al paciente.</p>
        
        <form id="form-pago">
            <div class="form-group">
                <label for="nro-turno">Número de Turno:</label>
                <input type="text" id="nro-turno" placeholder="Ej: 327" required>
            </div>

            <div class="form-group">
                <label for="dni-paciente">DNI del Paciente:</label>
                <input type="text" id="dni-paciente" placeholder="Ej: 45123456" required>
            </div>
            

            <button type="submit" class="btn-enviar">
                <span class="material-icons-round">check_circle</span>
                Registrar Pago
            </button>
        </form>
    </div>

    <script>
        const rol = sessionStorage.getItem('rol');

        const nroTurnoInput = document.getElementById('nro-turno');
        const dniPacienteInput = document.getElementById('dni-paciente'); 
        const formPago = document.getElementById('form-pago');

        formPago.addEventListener('submit', async (e) => {
            e.preventDefault(); 

            const numeroTurno = nroTurnoInput.value.trim();
            const dniPaciente = dniPacienteInput.value.trim();

            try {
                const responseDeRegistro = await fetch(`http://localhost:3000/turnos/pagos/efectivo`, {
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        idTurno: numeroTurno,
                        dni: dniPaciente,
                    })
                });

                if (!responseDeRegistro.ok) {
                    const message = await responseDeRegistro.json();
                    throw new Error(message.error);
                }

                const data = await responseDeRegistro.json();

                Swal.fire({
                    icon: 'success',
                    title: '¡Pago Registrado!',
                    text: `${data.mensaje}`,
                    confirmButtonColor: '#00a896',
                    allowOutsideClick: false,
                    allowEscapeKey: false
                }).then((result) => {
                    if (result.isConfirmed) {
                        window.location.href = 'index-secretaria.html';
                    }
                });

            } catch (error) {
                console.error("Error en la transacción:", error);
                await Swal.fire({
                    icon: 'error',
                    title: 'Error de operación',
                    text: `${error.message}`,
                    confirmButtonColor: '#00a896'
                });
            }
        });
    </script>
</body>
</html>
