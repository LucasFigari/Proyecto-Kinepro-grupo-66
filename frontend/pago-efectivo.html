<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Pago en Efectivo</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg-principal: #f4f7f6;
            --blanco: #ffffff;
            --texto-principal: #2c3e50;
            --texto-secundario: #7f8c8d;
            --celeste-clinico: #00a896;
            --verde-hover: #008f80;
            --borde: #e2e8f0;
            --sombra: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --radio-esquina: 12px;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', sans-serif; 
        }

        body { 
            background-color: var(--bg-principal); 
            color: var(--texto-principal); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px; 
        }

        .payment-container { 
            background: var(--blanco); 
            width: 100%; 
            max-width: 450px; 
            padding: 30px; 
            border-radius: var(--radio-esquina); 
            box-shadow: var(--sombra); 
        }

        h2 {
            font-size: 22px;
            margin-bottom: 8px;
            color: var(--texto-principal);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        h2 .material-icons-round {
            color: var(--celeste-clinico);
        }

        p {
            font-size: 14px;
            color: var(--texto-secundario);
            margin-bottom: 20px;
        }

        .form-group { 
            margin-bottom: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 8px;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 600;
            color: var(--texto-principal);
        }

        input { 
            padding: 12px; 
            font-size: 16px; 
            border: 1px solid var(--borde);
            border-radius: 8px;
            outline: none;
            background-color: var(--blanco);
            transition: border 0.2s;
            width: 100%;
        }

        input:focus {
            border-color: var(--celeste-clinico);
        }

        .btn-enviar {
            background: var(--celeste-clinico);
            border: none;
            color: white;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }

        .btn-enviar:hover {
            background: var(--verde-hover);
        }
    </style>
</head>
<body>

    <div class="payment-container">
        <h2>
            <span class="material-icons-round">payments</span>
            Pago en Efectivo
        </h2>
        <p>Registre el pago en caja identificando el turno y al paciente.</p>
        
        <form id="form-pago">
            <div class="form-group">
                <label for="nro-turno">Número de Turno:</label>
                <input type="text" id="nro-turno" placeholder="Ej: 327" required>
            </div>

            <div class="form-group">
                <label for="dni-paciente">DNI del Paciente:</label>
                <input type="text" id="dni-paciente" placeholder="Ej: 45123456" required>
            </div>
            

            <button type="submit" class="btn-enviar">
                <span class="material-icons-round">check_circle</span>
                Registrar Pago
            </button>
        </form>
    </div>

    <script>
    const rol = sessionStorage.getItem('rol');

    const nroTurnoInput = document.getElementById('nro-turno');
    const dniPacienteInput = document.getElementById('dni-paciente'); 
    const formPago = document.getElementById('form-pago');

    formPago.addEventListener('submit', async (e) => {
        e.preventDefault(); 

        const idTurno = nroTurnoInput.value.trim();
        const dniPaciente = dniPacienteInput.value.trim();

        try {
            const responseMonto = await fetch(`http://localhost:3000/turnos/precio/${idTurno}`);
            if (!responseMonto.ok) {
                throw new Error("No se pudo obtener la información del turno. Verifique el número de turno.");
            }
            const infoTurno = await responseMonto.json();
            const montoAPagar = infoTurno.precio || infoTurno.monto || 0; 

            const respuestaUsuario = await fetch(`http://localhost:3000/usuarios/dni/${dniPaciente}`);
            if (!respuestaUsuario.ok) {
                throw new Error("No se encontró ningún paciente registrado con ese DNI.");
            }
            const paciente = await respuestaUsuario.json();

            if (!paciente || !paciente.id) {
                throw new Error("El formato de los datos del paciente es incorrecto.");
            }

            const nombreCompleto = `${paciente.nombre} ${paciente.apellido}`;

            const verifPaciente = await Swal.fire({
                title: '¿Es el paciente correcto?',
                icon: 'info',
                html: `
                    <div style="text-align: center; font-family: 'Segoe UI', sans-serif;">
                        <p style="font-size: 15px; color: #7f8c8d; margin-bottom: 10px;">Confirme si los datos en pantalla coinciden:</p>
                        <div style="background-color: #e8f5e9; padding: 15px; border: 1px solid #c8e6c9; border-radius: 8px; text-align: left;">
                            <p style="margin: 0 0 8px 0; font-weight: 600; color: #2e7d32; font-size: 15px;">Datos del Paciente:</p>
                            <ul style="list-style: none; padding: 0; margin: 0; font-size: 14px; color: #1b5e20; display: flex; flex-direction: column; gap: 4px;">
                                <li><strong>Nombre y APellido:</strong> ${nombreCompleto}</li>
                                <li><strong>DNI:</strong> ${paciente.dni}</li>
                                <li><strong>Email:</strong> ${paciente.email || 'No posee'}</li>
                                <li><strong>Teléfono:</strong> ${paciente.telefono || 'No posee'}</li>
                            </ul>
                            <hr style="border: 0; border-top: 1px solid #c8e6c9; margin: 10px 0;">
                            <p style="margin: 0; font-size: 13px; color: #2c3e50;"><strong>N° Turno a asociar:</strong> #${idTurno}</p>
                        </div>
                    </div>
                `,
                showCancelButton: true,
                confirmButtonText: 'Sí, es correcto',
                cancelButtonText: 'No, cancelar',
                confirmButtonColor: '#00a896',
                cancelButtonColor: '#7f8c8d',
                allowOutsideClick: false
            });

            if (!verifPaciente.isConfirmed) return; 

            const confirmacion = await Swal.fire({
                title: 'Confirmar Monto',
                icon: 'question',
                html: `
                    <div style="text-align: center; font-family: 'Segoe UI', sans-serif;">
                        <p style="font-size: 15px; color: #7f8c8d; margin-bottom: 10px;">El total a cobrar en efectivo es:</p>
                        <h3 style="font-size: 28px; color: #00a896; margin-bottom: 20px;">$${montoAPagar}</h3>
                        <div style="background-color: #f4f7f6; padding: 12px; border-radius: 8px; text-align: left;">
                            <p style="margin: 4px 0; font-size: 14px; color: #2c3e50;"><strong>Paciente:</strong> ${nombreCompleto}</p>
                            <p style="margin: 4px 0; font-size: 14px; color: #2c3e50;"><strong>DNI:</strong> ${paciente.dni}</p>
                            <p style="margin: 4px 0; font-size: 14px; color: #2c3e50;"><strong>Turno:</strong> #${idTurno}</p>
                        </div>
                    </div>
                `,
                showCancelButton: true,
                confirmButtonText: 'Confirmar Pago',
                cancelButtonText: 'Cancelar',
                confirmButtonColor: '#00a896',
                cancelButtonColor: '#7f8c8d',
                allowOutsideClick: false
            });

            if (!confirmacion.isConfirmed) return; 

            const responseDeRegistro = await fetch(`http://localhost:3000/turnos/pagos/efectivo`, {
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    idTurno: idTurno,
                    dni: dniPaciente,
                    monto_pagado: montoAPagar,
                    metodo: "efectivo"
                })
            });

            const data = await responseDeRegistro.json();

            if (!responseDeRegistro.ok) {
                throw new Error(data.message || "No se pudo procesar el pago en el servidor.");
            }

            Swal.fire({
                icon: 'success',
                title: '¡Pago Registrado!',
                html: `
                    <div style="text-align: center; font-family: 'Segoe UI', sans-serif;">
                        <p style="font-size: 16px; color: #2c3e50; margin-bottom: 15px;"><strong>${data.message}</strong></p>
                        <div style="background-color: #f4f7f6; padding: 15px; border-radius: 8px; text-align: left; display: inline-block; width: 100%; box-sizing: border-box;">
                            <p style="margin: 5px 0; color: #7f8c8d;"><strong>Paciente:</strong> <span style="color: #2c3e50;">${nombreCompleto}</span></p>
                            <p style="margin: 5px 0; color: #7f8c8d;"><strong>Turno N°:</strong> <span style="color: #2c3e50;">${idTurno}</span></p>
                            <p style="margin: 5px 0; color: #7f8c8d;"><strong>Monto Pagado:</strong> <span style="color: #00a896; font-weight: bold;">$${montoAPagar}</span></p>
                            <p style="margin: 5px 0; color: #7f8c8d;"><strong>Código de Pago:</strong> <span style="color: #00a896; font-weight: bold;">${data.codigo || 'N/A'}</span></p>
                        </div>
                    </div>
                `,
                confirmButtonColor: '#00a896',
                allowOutsideClick: false,
                allowEscapeKey: false
            }).then((result) => {
                if (result.isConfirmed) {
                    window.location.href = 'index-secretaria.html';
                }
            });

        } catch (error) {
            console.error("Error en la transacción:", error);
    
            let mensajeAMostrar = error.message || "Ocurrió un error inesperado.";

            if (error.name === "TypeError" || error.message.includes("fetch")) {
                mensajeAMostrar = "No se pudo conectar con el servidor.";
            }

            await Swal.fire({
                icon: 'error',
                title: 'Error de operación',
                text: mensajeAMostrar,
                confirmButtonColor: '#00a896'
            });
        }
    });
</script>
</body>
</html>
