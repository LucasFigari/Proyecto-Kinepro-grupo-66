<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>"Registro De Paciente"</title>
</head>
<body>

    <h1>Complete el formulario</h1>

    <form>
        
        <div>

            <img class="fotoPerfil" src="./src/assets/user-image-default.jpg" alt="Foto de Perfil">
            <button>Cambiar Foto</button>

        </div>

        <div>

            <label>Nombre</label>
            <input type="text">

        </div>

        <div>

            <label>Apellido</label>
            <input type="text">

        </div>

        <div>

            <label>DNI</label>
            <input type="text">

        </div>

        <div>

            <label>Correo</label>
            <input type="email">

        </div>
        
        <div>

            <label>Telefono</label>
            <input type="number">

        </div>
        
        <div>

            <label>Contraseña</label>
            <input type="password">
            
        </div>

        <button id="btnRegistrarPaciente" type="submit">Registrar</button>

    </form>

</body>
</html>
