<!DOCTYPE html>
<html lang="en">

    <head>

        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Registro De Paciente</title>

    </head>

    <body>

        <div class="p-3 mb-2 bg-info-subtle text-dark">

            <h1>Complete el formulario</h1>

            <div>

                <form id="formRegistroPaciente">  <!--comienza el formulario-->
                    
                    <div class="border border-success-subtle">

                        <div class="mb-4"> 

                            <img class="fotoPerfil" src="./src/assets/user-image-default.jpg" alt="Foto de Perfil"> <!--Imagen perfil y botón para cambiar-->
                            <button type="button">Cambiar Foto</button>

                        </div>

                        <div class="mb-3">
                
                            <label class="form-label">Nombre</label> <!--campo nombre-->
                            <input type="text" class="form-control w-25 p-3" id="nombreRegistro">
                
                        </div>
                
                        <div class="mb-3">

                            <label class="form-label">Apellido</label>   <!--campo apellido-->
                            <input type="text" class="form-control w-25 p-3" id="apellidoRegistro">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">Dni</label>
                            <input type="text" class="form-control w-25 p-3" id="dniRegistro"> <!--campo  dni-->

                        </div>

                        <div class="mb-3">

                            <label class="form-label">Correo electronico</label> <!--campo correo-->
                            <input type="email" class="form-control w-25 p-3" id="emailRegistro">
                
                        </div>
                    
                        <div class="mb-3">
                
                            <label class="form-label">Telefono</label> <!--campo telefono-->
                            <input type="text" class="form-control w-25 p-3" id="telefonoRegistro">

                        </div>
                        
                        <div class="mb-3">
                
                            <label class="form-label">Contraseña</label> <!--campo contraseña-->
                            <input type="password" class="form-control w-25 p-3" id="contraseñaRegistro">

                        </div>

                        <div class="mb-3"><button id="btnRegistrarPaciente" type="submit">Registrar</button></div>  <!--boton para confirmar registro-->
                        <div id="mensaje" class="mt-2"></div>
                    </div>

                </form> <!--finaliza el formulario-->

    <div class="p-4 card-registro shadow-sm rounded-4">
        
     <div class="text-center mb-4">
    
    <h4 class="fw-bold" style="color: #333;">Registro de Paciente</h4>
</div>
        <form id="formRegistroPaciente">
            <div class="row g-2">
                <div class="col-6 mb-2">
                    <label class="form-label fw-semibold small">Nombre</label>
                    <input type="text" class="form-control form-control-sm" id="nombreRegistro" required>
                </div>
                <div class="col-6 mb-2">
                    <label class="form-label fw-semibold small">Apellido</label>
                    <input type="text" class="form-control form-control-sm" id="apellidoRegistro" required>
                </div>
            </div>

            <div class="mb-2">
                <label class="form-label fw-semibold small">DNI</label>
                <input type="text" class="form-control form-control-sm" id="dniRegistro" required>
            </div>

            <div class="mb-2">
                <label class="form-label fw-semibold small">Correo electrónico</label>
                <input type="email" class="form-control form-control-sm" id="emailRegistro" required>
            </div>

            <div class="mb-2">
                <label class="form-label fw-semibold small">Teléfono</label>
                <input type="text" class="form-control form-control-sm" id="telefonoRegistro">
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold small">Contraseña</label>
                <input type="password" class="form-control form-control-sm" id="contraseñaRegistro" required>
            </div>

            <div class="d-grid">
                <button id="btnRegistrarPaciente" class="btn btn-celeste-personalizado py-2" type="submit">
                    Registrar Paciente
                </button>
            </div>
        </form>
    </div>

    <script src="./src/registrarPaciente.js"></script>
</body>
</html>
