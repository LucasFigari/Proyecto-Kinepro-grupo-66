<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>"Registro De Paciente"</title>
</head>
<body>

    <h1>Complete el formulario</h1>

    <img class="fotoPerfil" src="./src/assets/user-image-default.jpg" alt="Foto de Perfil">
    <button>Cambiar Foto</button>

    <form>
        
        <label>DNI</label>
        <input type="text">
        
        <label>Correo</label>
        <input type="email">

        <label>Nombre</label>
        <input type="text">
        
        <label>Apellido</label>
        <input type="text">
        
        <label>Telefono</label>
        <input type="number">
        
        <label>Contraseña</label>
        <input type="password">

        <button id="btnRegistrarPaciente" type="submit">Registrar</button>

    </form>

</body>
</html>
