<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./src/style2.css"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Menu de Usuario</title>
</head>
<style>* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

#columnaIzquierda {
    position: fixed;
    left: 0;
    top: 0;
    width: 250px;
    height: 100vh; /* 100% del alto de la ventana */
    display: flex;
    flex-direction: column;
    /* Esto evita que se vea blanco si algo falla */
    background-color: #B5D1E8; 
}

.franja-color {
    width: 100%;
    flex-grow: 1; /* Esto hace que cada bloque se estire para llenar el espacio */
    border-bottom-right-radius: 80px; 
    position: relative;
    padding: 20px;
}

#bloque1 { 
    margin-top: -90px;
    background-color: #72B9CB; z-index: 3; }

#bloque2 { 
    background-color: #D1E9F0; 
    z-index: 2; 
    margin-top: -250px; /* Mantenemos el solapamiento */
    padding-top: 80px;
}

#bloque3 { 
    background-color: #B5D1E8; 
    z-index: 1; 
    margin-top: -80px;
    padding-top: 100px;
    border-bottom-right-radius: 0; /* El último termina recto abajo */
}
.btn-lateral {
    /* 1. Grosor, estilo y color del borde */
    border: 2px solid #72B9CB; 
    
    /* 2. Redondeado (para que no sea un rectángulo rígido) */
    border-radius: 10px; 
    
    /* 3. Espaciado interno para que el texto no toque los bordes */
    padding: 10px 20px;
    
    /* Colores base */
    background-color: #D1E9F0; 
    color: #72B9CB;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s;
}
.btn-lateral-secundario {
    width: 130px;
    height: 35px;
    font-size: 0.8rem;
}

#botonPerfil{
    width: 170px;
    height: 50px;
    font-size: 1rem;
}

/* Efecto al pasar el mouse */
#botonPerfil:hover {
    background-color: #72B9CB;
    color: #D1E9F0;
    /* Podés redondearlo más cuando pasás el mouse si querés un efecto moderno */
   
}
#botonCerrar {
    width: 90px; 
    font-size:9px;
    white-space: nowrap;
    padding: 3px 6px; /* Espacio arriba/abajo y a los lados */
}

.contenedor-areas { 
    margin-left: 250px;
    display: flex; 
    flex-wrap:wrap; 
    gap: 20px; 
    padding: 20px;
}
.tren {
    background-color: #EAF4F7;
    border-radius: 15px;
    padding: 15px;
    width: 320px;
    display: flex;
    flex-direction: column;
    transition: transform 0.3s ease;
}
.imagen-tren{
    width: 48%;
    height: 140px;
    margin-bottom: 10px;
}

.titulo-tren {
    background-color: #D89A4D;
    color: white;
    font-weight: bold;
    padding: 8px 15px;
    border-radius: 8px;
    width: fit-content; /* ocupa su contenido*/
    margin-bottom: 15px;
    font-size: 15px;
}
.descripcion-tren {
    color: #3A4A54;
    font-size: 15px;
    margin-bottom: 15px;
}
.btn-detalles {
    align-self: flex-end; /* lo mantiene a la derecha */
    border: none; /*saco borde */

    padding: 8px 7px; /* espacio interno entre letra y borde */
    border-radius: 8px; /* redondeo */
    cursor: pointer; /*paso de cursor cmbia*/
    /*base*/
    font-weight: bold;
    background-color: #5C99B3;
    color: white;
    transition: background-color 0.3s; 
    margin-top: auto; /*m,argen */
}

.btn-detalles:hover {
    background-color: #4B859E;
}


.success {background-color: #72B9CB; border: 10px solid #04AA6D;} 
.success:hover {background-color: #D1E9F0; color: white;}
.contenedor-del-boton {
    display: flex;           /* Activa el modo flexible */
    flex-direction: column; /* Apila verticalmente de arriba hacia abajo */
    /* justify-content: center; */ /* Centra horizontalmente */
    align-items: center;     /* Centra verticalmente (si el div tiene altura) */
    gap: 20px;
    /* height: 100px;  */          /* Opcional: solo si querés darle un alto fijo */
    margin-top: 40px
}
</style>
<body>
    <div id="app">
        </div>

   <script type="module"> // Agregamos type="module" por Vite
    const app = document.querySelector('#app');
    
    // 1. Inyectamos el HTML primero
    app.innerHTML = `
        <div id="columnaIzquierda">
            <div id="bloque1" class="franja-color">
                <p>Datos de usuario</p>
            </div>
            <div id="bloque2" class="franja-color"></div>
            <div id="bloque3" class="franja-color">
                <div class="contenedor-del-boton">
                    <button id="botonPerfil" class="btn-lateral">Ver Perfil</button>
                    <button id="botonTurnos" class="btn-lateral btn-lateral-secundario"> TURNOS </button>
                    <button id="botonHistorial" class="btn-lateral btn-lateral-secundario"> HISTORIAL </button>
                    <button id="botonCerrar" class="btn-lateral btn-lateral-secundario"> CERRAR SESIÓN</button>
                </div>
            </div>
        </div>

        <div id="contenidoPrincipal" style="margin-left: 250px; padding: 20px;">
            <h2>Bienvenido a KinePro</h2>
            <p>Seleccioná una opción del menú.</p>
            <div class="contenedor-areas">
            <div class="tren">
                <div class="titulo-tren"> TREN SUPERIOR </div>
                <img class="imagen-tren" src="/src/imagenes/TrenSuperiorUsuario.png">
                <p class="descripcion-tren"> Rehabilitación de hombro, brazo y mano.</p>
                <button id="btnDetallesSuperior" class="btn-detalles"> Ver detalles </button>
            </div>
            <div class="tren">
                <div class="titulo-tren"> TREN MEDIO </div>
                <img class="imagen-tren" src="/src/imagenes/TrenMedioUsuario.png">
                <p class="descripcion-tren"> Estabilidad del núcleo(core). Alivio del dolor lumbar y torácico. Correción postural</p>
                <button id="btnDetallesMedio"class="btn-detalles"> Ver detalles </button>
            </div>
            <div class="tren">
                <div class="titulo-tren"> TREN INFERIOR </div>
                <img class="imagen-tren" src="/src/imagenes/TrenInferiorUsuario.png">
                <p class="descripcion-tren"> Tratamiento de caderas, rodillas y pies. Equilibrio y marcha. Recuperacion de lesiones deportivas </p>
                <button id="btnDetallesInferior" class="btn-detalles"> Ver detalles </button>
            </div>
        </div>  
        </div>
        
    `;

    // 2. Buscamos los elementos después de inyectar
    const boton = document.getElementById('botonPerfil');
    const contenido = document.getElementById('contenidoPrincipal');
   
    boton.addEventListener('click', async () => {
        contenido.innerHTML = '<p>Buscando datos en la base de datos...</p>';     
          
        try {
            const respuesta = await fetch('http://localhost:3000/usuarios/Perfil/1');    
            if (!respuesta.ok) {
                throw new Error("No se encontró el usuario en la base de datos");
            }
            const usuario = await respuesta.json();
            contenido.innerHTML = `
                <div class="perfil-contenedor">
                    <h2>Perfil de Usuario</h2>
                    <hr>
                    <p><strong>Nombre:</strong> ${usuario.nombre} ${usuario.apellido}</p>
                    <p><strong>DNI:</strong> ${usuario.dni}</p>
                    <p><strong>Email:</strong> ${usuario.email}</p>
                    <p><strong>Teléfono:</strong> ${usuario.telefono}</p>
                    
                </div>
            `;
        } catch (error) {
            contenido.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            console.error("Detalle:", error);
        }
    });




/* conecto al back y pido cupo */
async function pedirCupoAlBackend(nombreDelArea) {
    try {
        // Le avisam al backend qué área quiere tocar
        const respuesta = await fetch('http://localhost:3000/area/reservar', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nombreArea: nombreDelArea })
        });

        const resultado = await respuesta.json();

        //alertas de oprueba
        if (!respuesta.ok) {
            //  No hay cupo o no existe el área
            alert(` Error: ${resultado.detalles}`);
        } else {
            // alerta de prueba, sumó el cupo con éxito
            alert(` Reserva Exitosa Cupos: ${resultado.area.cupoOcupados}/${resultado.area.cupoMaximo}`);
        }

    } catch (error) {
        alert("No se pudo conectar con el servidor. ¿Está encendido el backend?");
    }
}

document.getElementById('btnDetallesSuperior').addEventListener('click', () => {
    pedirCupoAlBackend('TREN SUPERIOR'); // Llama a la función mandando este texto exacto
});

document.getElementById('btnDetallesMedio').addEventListener('click', () => {
    pedirCupoAlBackend('TREN MEDIO');
});

document.getElementById('btnDetallesInferior').addEventListener('click', () => {
    pedirCupoAlBackend('TREN INFERIOR');
});


</script>
</body>
</html>
